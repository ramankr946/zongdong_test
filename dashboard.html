<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZongDong Admin — BigQuery Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0B0D11;--bg2:#12151C;--bg3:#1A1E28;--bg4:#222736;
  --border:#2A2F3D;--border2:#353B4D;
  --txt:#E8EAF0;--txt2:#8B92A8;--txt3:#5A6078;
  --accent:#E8531A;--accent2:#FF7043;--accent-dim:rgba(232,83,26,.12);
  --gold:#F5C842;--gold-dim:rgba(245,200,66,.1);
  --green:#22C55E;--green-dim:rgba(34,197,94,.1);
  --blue:#3B82F6;--blue-dim:rgba(59,130,246,.1);
  --red:#EF4444;--red-dim:rgba(239,68,68,.1);
  --yellow:#F59E0B;--yellow-dim:rgba(245,158,11,.1);
  --radius:10px;--radius-lg:14px;
  --font:'Sora',sans-serif;--mono:'Space Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;font-size:14px}
.shell{display:flex;min-height:100vh}
.sidebar{width:224px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:50;flex-shrink:0;transition:transform .3s}
.main-area{margin-left:224px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--gold));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sb-logo-txt{font-family:var(--mono);font-size:.85rem;font-weight:700;color:var(--txt)}
.sb-logo-txt span{color:var(--gold)}
.sb-label{padding:16px ar(--yellow-dim);border-color:var(--yellow);color:var(--yellow)}
.conn-dot{width:6px;height:6px;border-radius:50%;background:currentColor}

/* TOPBAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.topbar-title{font-family:var(--mono);font-size:.88rem;font-weight:700;display:flex;align-items:center;gap:8px}
.live-dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.topbar-right{display:flex;align-items:center;gap:8px}
.tb-pill{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:.7rem;color:var(--txt2);display:flex;align-items:center;gap:4px}
.tb-pill.live{background:var(--accent-dim);border-color:var(--accent);color:var(--accent2)}
.refresh-btn{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--txt2);cursor:pointer;font-size:.75rem;transition:all .2s;display:flex;align-items:center;gap:5px}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent2)}
.refresh-btn.spinning svg{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* CONTENT */
.content{padding:20px;flex:1}
.page{display:none}.page.active{display:block}

/* STATS */
.stat-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin-bottom:18px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;transition:border .2s}
.stat-card:hover{border-color:var(--border2)}
.sc-icon{font-size:1.3rem;margin-bottom:5px}
.sc-val{font-family:var(--mono);font-size:1.25rem;font-weight:700;margin-bottom:2px}
.sc-lbl{font-size:.67rem;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px}
.sc-chg{font-size:.67rem;margin-top:3px;font-weight:600}
.sc-chg.up{color:var(--green)}.sc-chg.dn{color:var(--red)}.sc-chg.neu{color:var(--txt3)}

/* TABLE CARD */
.tcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:18px}
.tcard-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.tcard-title{font-size:.82rem;font-weight:700;display:flex;align-items:center;gap:6px}
.tcard-actions{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.search-box{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:6px 11px;color:var(--txt);font-family:var(--font);font-size:.75rem;outline:none;width:190px;transition:border .2s}
.search-box::placeholder{color:var(--txt3)}
.search-box:focus{border-color:var(--accent)}
.sel-box{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:6px 10px;color:var(--txt);font-family:var(--font);font-size:.75rem;outline:none;cursor:pointer}
.sel-box option{background:var(--bg3)}
.btn{padding:6px 13px;border-radius:7px;border:none;cursor:pointer;font-family:var(--font);font-size:.72rem;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{background:var(--accent2)}
.btn-ghost{background:var(--bg3);border:1px solid var(--border);color:var(--txt2)}.btn-ghost:hover{border-color:var(--border2);color:var(--txt)}
.btn-green{background:var(--green-dim);border:1px solid var(--green);color:var(--green)}.btn-green:hover{background:var(--green);color:#000}
