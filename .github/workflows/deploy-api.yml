name: Deploy API to Cloud Run
"on":
  push:
    branches: [main]
    paths:
      - server.js
      - package.json
      - Dockerfile
      - .github/workflows/deploy-api.yml
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
      - name: Build image
        run: docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/zongdong-api:${{ github.sha }} .
      - name: Push image
        run: docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/zongdong-api:${{ github.sha }}
      - name: Deploy to Cloud Run
        run: gcloud run deploy zongdong-api --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/zongdong-api:${{ github.sha }} --platform managed --region us-central1 --allow-unauthenticated --set-env-vars GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},ADMIN_SECRET=${{ secrets.ADMIN_SECRET }} --project ${{ secrets.GCP_PROJECT_ID }}
